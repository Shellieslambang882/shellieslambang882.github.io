name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AD4662: ${{ secrets.AD4662 }}
          B459C9: ${{ secrets.B459C9 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AD4662', '')
          meta_b = os.environ.get('B459C9', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- ad56f01f52ea0240 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 60d87e6405bd585436a9b1391cea45b861ad6f7c657a6af7 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
